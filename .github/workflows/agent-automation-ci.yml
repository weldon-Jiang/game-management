# CI/CD Pipeline
# ==============
# Agent自动化模块的完整测试流水线

name: Agent Automation CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'

jobs:
  agent-unit-tests:
    name: Agent - Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bend-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov aiohttp

      - name: Run unit tests
        run: |
          pytest src/agent/automation/tests/test_task_context.py \
                src/agent/automation/tests/test_platform_api_client.py \
                src/agent/automation/tests/test_automation_scheduler.py \
                -v --junitxml=unit-test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-unit-test-results
          path: bend-agent/unit-test-results.xml

  agent-integration-tests:
    name: Agent - Integration Tests
    runs-on: ubuntu-latest
    needs: agent-unit-tests
    defaults:
      run:
        working-directory: ./bend-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio aiohttp

      - name: Run integration tests with Mock Server
        run: |
          pytest src/agent/automation/tests/test_integration.py \
                src/agent/automation/tests/test_with_mock_server.py \
                -v --junitxml=integration-test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-integration-test-results
          path: bend-agent/integration-test-results.xml

  agent-performance-tests:
    name: Agent - Performance Tests
    runs-on: ubuntu-latest
    needs: agent-integration-tests
    defaults:
      run:
        working-directory: ./bend-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio

      - name: Run performance tests
        run: |
          pytest src/agent/automation/tests/test_performance.py -v -m "performance"

  platform-unit-tests:
    name: Platform - Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bend-platform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: |
          mvn test -Dtest=TaskServiceTest,AgentCallbackControllerTest

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: platform-unit-test-results
          path: bend-platform/target/surefire-reports/

  ui-tests:
    name: UI - E2E Tests
    runs-on: ubuntu-latest
    needs: platform-unit-tests
    defaults:
      run:
        working-directory: ./bend-platform-web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: bend-platform-web/test-results/

  all-tests-summary:
    name: All Tests Summary
    runs-on: ubuntu-latest
    needs: [agent-unit-tests, agent-integration-tests, agent-performance-tests, platform-unit-tests, ui-tests]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display test summary
        run: |
          echo "="*60
          echo "  AGENT AUTOMATION - CI/CD TEST SUMMARY"
          echo "="*60
          echo ""
          echo "✅ Agent Unit Tests: ${{ needs.agent-unit-tests.result }}"
          echo "✅ Agent Integration Tests: ${{ needs.agent-integration-tests.result }}"
          echo "✅ Agent Performance Tests: ${{ needs.agent-performance-tests.result }}"
          echo "✅ Platform Unit Tests: ${{ needs.platform-unit-tests.result }}"
          echo "✅ UI E2E Tests: ${{ needs.ui-tests.result }}"
          echo ""
          echo "="*60
