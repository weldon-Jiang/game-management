# ================================================
# 分控 Gateway(Tenant)模式 profile
# 启动方式: SPRING_PROFILES_ACTIVE=tenant
# ================================================
# 分控 gateway 不连接 Redis:
#   - 排除 Redis 自动配置(不创建 ReactiveStringRedisTemplate)
#   - RateLimitFilter 检测到 Redis 缺失自动放行(限流交由后端本地兜底)
#   - 关闭网关层限流(局域网单实例,非必需);如需保留可设 true,但无 Redis 时仍会放行
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

bend:
  gateway:
    rate-limit:
      enabled: false
