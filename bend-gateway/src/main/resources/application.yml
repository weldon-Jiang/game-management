server:
  port: 8060

spring:
  application:
    name: bend-gateway

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:D$U@GAMECeKfi}  # 本地开发和 Docker 都用这个密码
      database: 0

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: backend-service
          uri: http://${BACKEND_HOST:localhost}:${BACKEND_PORT:8061}
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=0
        - id: websocket-service
          uri: http://${BACKEND_HOST:localhost}:${BACKEND_PORT:8061}
          predicates:
            - Path=/ws/**
          filters:
            - StripPrefix=0
        - id: actuator-service
          uri: http://${BACKEND_HOST:localhost}:${BACKEND_PORT:8061}
          predicates:
            - Path=/actuator/**
          filters:
            - StripPrefix=0

    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:-localhost:8080}
      eager: true
      scg:
        fallback:
          mode: response
          response-body: '{"code":429,"message":"请求过于频繁，请稍后再试"}'
          response-status: 429

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

bend:
  gateway:
    rate-limit:
      enabled: true
      default:
        qps: 100
        burst: 50
      paths:
        - path: /api/auth/login
          qps: 5
          burst: 3
        - path: /api/auth/register
          qps: 3
          burst: 2
        - path: /api/registration-codes/activate
          qps: 5
          burst: 3
        - path: /api/agents/**
          qps: 50
          burst: 30
    ip-filter:
      enabled: true
      blacklist: []
      whitelist: []
    circuit-breaker:
      enabled: true
