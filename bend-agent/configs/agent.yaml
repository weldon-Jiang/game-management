# ================================================
# Bend Agent 配置文件
# ================================================
# 本文件用于配置 Agent 的所有运行参数
# 修改后需要重启 Agent 生效

# ----------------------------------------------
# AES加密配置（必须与平台侧 bend-platform/.env 中的 AES_SECRET 一致）
# PowerShell 生成随机密钥: $bytes = New-Object byte[] 16; $random = [System.Security.Cryptography.RandomNumberGenerator]::Create(); $random.GetBytes($bytes); [Convert]::ToBase64String($bytes)
# ----------------------------------------------
aes:
  secret: "0sedzo/xcWVHjwKvJAk4lg=="

# ----------------------------------------------
# 后端服务器配置
# ----------------------------------------------
backend:
  base_url: "http://localhost:8060"
  ws_url: "ws://localhost:8060/ws/agents"
  api_prefix: "/api"

# ----------------------------------------------
# Agent设置
# ----------------------------------------------
agent:
  heartbeat_interval: 30
  reconnect_delay: 5
  max_reconnect_attempts: 10

# ----------------------------------------------
# 视频捕获配置
# ----------------------------------------------
video:
  fps: 10
  capture_interval: 0.1
  max_frame_buffer: 5

# ----------------------------------------------
# 模板匹配配置
# ----------------------------------------------
template:
  threshold: 0.8
  template_dir: "./templates"
  cache_enabled: true

# ----------------------------------------------
# 场景检测配置
# ----------------------------------------------
scene:
  detection_interval: 0.5
  confidence_threshold: 0.7

# ----------------------------------------------
# 输入控制配置
# ----------------------------------------------
input:
  click_delay: 0.1
  key_press_delay: 0.05
  move_duration: 0.2

# ----------------------------------------------
# 自动化任务配置
# ----------------------------------------------
automation:
  max_retries: 3
  retry_delay: 2
  action_cooldown: 1

# ----------------------------------------------
# 任务执行器配置（高并发支持）
# ----------------------------------------------
task:
  max_concurrent: 100
  max_xbox_sessions: 100
  result_ttl: 3600
  cleanup_interval: 300

# ----------------------------------------------
# 日志配置
# ----------------------------------------------
logging:
  level: "INFO"
  file: "./logs/agent.log"
  max_size: 10
  backup_count: 5

# ----------------------------------------------
# 窗口配置
# ----------------------------------------------
window:
  default_width: 1280
  default_height: 720
  min_width: 800
  min_height: 600
