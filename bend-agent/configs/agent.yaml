# ================================================
# Bend Agent 配置文件
# ================================================
# 本文件用于配置 Agent 的所有运行参数
# 修改后需要重启 Agent 生效

# ----------------------------------------------
# AES加密配置（必须与平台侧 bend-platform/.env 中的 AES_SECRET 一致）
# PowerShell 生成随机密钥: $bytes = New-Object byte[] 16; $random = [System.Security.Cryptography.RandomNumberGenerator]::Create(); $random.GetBytes($bytes); [Convert]::ToBase64String($bytes)
# ----------------------------------------------
aes:
  secret: "0sedzo/xcWVHjwKvJAk4lg=="

# ----------------------------------------------
# 后端服务器配置
# ----------------------------------------------
backend:
  base_url: "http://localhost:8080"    # 后端服务HTTP地址
  ws_url: "ws://localhost:8080"       # 后端WebSocket地址
  api_prefix: "/api"                  # API前缀

# ----------------------------------------------
# Agent设置
# ----------------------------------------------
agent:
  heartbeat_interval: 30   # 心跳间隔（秒），Agent定期向平台发送心跳以证明存活
  reconnect_delay: 5        # 断线重连延迟（秒）
  max_reconnect_attempts: 10 # 最大重连次数

# ----------------------------------------------
# 视频捕获配置
# ----------------------------------------------
video:
  fps: 10                  # 每秒捕获帧数（仅用于视觉检测任务）
  capture_interval: 0.1     # 捕获间隔（秒）
  max_frame_buffer: 5       # 帧缓冲区大小

# ----------------------------------------------
# 模板匹配配置
# ----------------------------------------------
template:
  threshold: 0.8            # 匹配阈值（0-1），值越高匹配越严格
  template_dir: "./templates"  # 模板图片目录
  cache_enabled: true      # 是否启用模板缓存

# ----------------------------------------------
# 场景检测配置
# ----------------------------------------------
scene:
  detection_interval: 0.5   # 场景检测间隔（秒）
  confidence_threshold: 0.7 # 置信度阈值（0-1）

# ----------------------------------------------
# 输入控制配置
# ----------------------------------------------
input:
  click_delay: 0.1         # 点击后延迟（秒）
  key_press_delay: 0.05     # 按键延迟（秒）
  move_duration: 0.2       # 鼠标移动时长（秒）

# ----------------------------------------------
# 自动化任务配置
# ----------------------------------------------
automation:
  max_retries: 3           # 最大重试次数
  retry_delay: 2           # 重试延迟（秒）
  action_cooldown: 1       # 操作间隔冷却时间（秒）

# ----------------------------------------------
# 任务执行器配置（高并发支持）
# ----------------------------------------------
# 控制Agent同时处理多个任务的能力
task:
  max_concurrent: 100      # 最大并发任务数（所有类型任务总和）
  max_xbox_sessions: 100   # 最大Xbox SmartGlass并发连接数
                            # 每个连接对应一台Xbox主机
  result_ttl: 3600          # 任务结果缓存有效期（秒），超过此时间的结果会被清理
  cleanup_interval: 300     # 清理过期结果的间隔（秒）

# ----------------------------------------------
# 日志配置
# ----------------------------------------------
logging:
  level: "INFO"            # 日志级别：DEBUG, INFO, WARNING, ERROR
  file: "./logs/agent.log" # 日志文件路径
  max_size: 10             # 日志文件最大大小（MB）
  backup_count: 5           # 保留的日志备份文件数量

# ----------------------------------------------
# 窗口配置
# ----------------------------------------------
window:
  default_width: 1280       # 默认窗口宽度
  default_height: 720      # 默认窗口高度
  min_width: 800            # 最小窗口宽度
  min_height: 600          # 最小窗口高度
