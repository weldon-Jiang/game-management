# ================================================
# Bend Agent 配置文件
# ================================================
# 本文件用于配置 Agent 的所有运行参数
# 修改后需要重启 Agent 生效

# ----------------------------------------------
# AES加密配置（必须与平台侧 bend-platform/.env 中的 AES_SECRET 一致）
# PowerShell 生成随机密钥: $bytes = New-Object byte[] 16; $random = [System.Security.Cryptography.RandomNumberGenerator]::Create(); $random.GetBytes($bytes); [Convert]::ToBase64String($bytes)
# ----------------------------------------------
aes:
  secret: "0sedzo/xcWVHjwKvJAk4lg=="

# ----------------------------------------------
# 后端服务器配置
# ----------------------------------------------
backend:
  base_url: "http://localhost:8060"
  ws_url: "ws://localhost:8060/ws/agent"
  api_prefix: "/api"

# Platform 回调 API 默认由 backend.base_url + api_prefix 推导，与 ApiClient 共用网关地址
# 可选覆盖: platform.api_url: "http://localhost:8060/api"

# ----------------------------------------------
# Agent设置
# ----------------------------------------------
agent:
  heartbeat_interval: 60
  ws_heartbeat_interval: 30
  reconnect_delay: 5
  max_reconnect_attempts: 10

# Agent → Platform 进度回调节流（秒）；终态 COMPLETED/FAILED/CANCELLED 不受限
platform:
  progress_report_interval_sec: 2

# ----------------------------------------------
# 视频捕获配置
# ----------------------------------------------
video:
  fps: 10
  capture_interval: 0.1
  max_frame_buffer: 5

# ----------------------------------------------
# 模板匹配配置
# ----------------------------------------------
template:
  threshold: 0.8
  template_dir: "./templates"
  cache_enabled: true

# ----------------------------------------------
# FC Server 远程场景识别（可选，对齐 streaming 生产路径）
# ----------------------------------------------
fc_server:
  enabled: false
  host: "127.0.0.1"
  port: 8080
  prefer_remote_scene: false
  use_remote_play: false   # 启用 FC PLAY 20Hz 比赛 loop（需 enabled=true）

# ----------------------------------------------
# 场景检测配置
# ----------------------------------------------
scene:
  detection_interval: 0.5
  confidence_threshold: 0.7

# ----------------------------------------------
# 输入控制配置
# ----------------------------------------------
input:
  click_delay: 0.1
  key_press_delay: 0.05
  move_duration: 0.2
  pump_focus_hz: 125       # InputPump 人工输入采样（void 保活由 xsrp access 环 30Hz 负责）
  pump_background_hz: 10   # 非焦点任务轮询间隔

# ----------------------------------------------
# 自动化任务配置
# ----------------------------------------------
automation:
  max_retries: 3
  retry_delay: 2
  action_cooldown: 1

# Step4：false=走 switch_to（内含主页 OCR 匹配则自动跳过切换）；true=强制跳过切换（仅调试）
step4:
  skip_account_switch: false
  # 自动化「按住 A 跳过」过场/庆祝（scene 101/102/189/190 等）
  hold_a_skip_sec: 2.0
  dismiss_a_tap_sec: 0.12
  # 场中占位输入：左摇杆/面键单次 hold 与周期间隔（秒）
  in_match_stick_hold_sec: 0.45
  in_match_button_hold_sec: 0.25
  in_match_tick_interval_sec: 0.85

# Step4 档案 OCR（PaddleOCR PP-OCRv6_tiny + ONNX Runtime）
ocr:
  engine: onnxruntime
  det_model: PP-OCRv6_tiny_det
  rec_model: PP-OCRv6_tiny_rec
  enable_mkldnn: true
  cpu_threads: 0              # 0=自动 max(10, 逻辑核数)
  min_crop_brightness: 25    # 裁剪区过暗则跳过 OCR
  min_rec_confidence: 0.12
  min_line_confidence: 0.12

# 调试：场景顺序截图 + 手柄输入日志（输出 logs/scene_capture/{task_id}/）
debug:
  scene_capture_enabled: true
  input_trace_enabled: true
  # 串流窗口人工调试（须先点击 Xbox 窗口获得焦点）
  manual_input_enabled: true       # Step4 期间保留键盘；false=与旧行为一致停键盘
  manual_takeover_hotkey: f8       # 切换人工接管（拦截自动化按键）
  manual_screenshot_hotkey: f9     # 保存 960×540 → logs/manual_capture/{task_id}/
  manual_help_hotkey: f10
  # F8 导航：短按跳一格；长按超过 delay 后按 interval 重复（面键 A/B/X/Y 按住即持续）
  manual_nav_repeat_delay_sec: 0.45
  manual_nav_repeat_interval_sec: 0.12
  # F8 键盘：split=WASD 左摇杆 + 方向键十字键；auto/stick/dpad=旧调试模式
  manual_keyboard_movement: split

# ----------------------------------------------
# 认证配置
# ----------------------------------------------
auth:
  provider: xblive              # 生产固定 xblive（SISU）；MSAL 仅 scripts/debug
  # 唯一保留的并发上限：Playwright 浏览器登录（压测后按实测调整）
  browser_login_max_concurrent: 3
  device_code_timeout: 300      # MSAL 设备码认证总超时（秒）
  xblive_web_headless: true      # xblive Playwright 回退是否无头
  xhome_token_ttl_sec: 14340
  xsts_token_ttl_sec: 57540
  prefetch_console_discovery: true

discovery:
  cache_ttl_sec: 90
  platform_lan_cache_enabled: true   # 同商户同 /24 网段共享平台 Redis 发现缓存
  ssdp_enrich_enabled: false
  smartglass_udp_enabled: true       # OpenXbox 0xDD00 UDP 5050 发现（LAN 优先）
  smartglass_udp_timeout_sec: 5
  ps_udp_enabled: true               # Chiaki SRCH UDP 987/9302 发现（PlayStation）
  ps_udp_timeout_sec: 5
  wakeup_timeout_sec: 30
  smartglass_wake_fallback: true

# GSSV / xHome 云端（设备列表、play session；baseUri 来自 xHome offeringSettings.regions）
gssv:
  stream_mode: cloud
  cloud_provision_timeout_sec: 45
  cloud_webrtc_timeout_sec: 90
  cloud_first_frame_timeout_sec: 20
  cloud_post_provision_delay_sec: 2
  cloud_ice_exchange_timeout_sec: 20
  cloud_reconnect_timeout_sec: 45
  # GSSV input ~35s idle 断开：须持续发 neutral gamepad（对齐 xsrpd 每帧 WriteControllerData）
  gssv_keepalive_interval_sec: 3
  input_reconnect_wait_sec: 8
  xsrp_capture_fps: 30
  xsrp_streaming_idle_pulse_sec: 20   # 空闲 Nexus 防 Xbox 屏保 / GSSV idle-off
  manual_idle_pulse_sec: 20            # F8/平台暂停无按键时 Nexus 脉冲（InputPump 接管）
  input_metadata_refresh_sec: 30      # 周期性重发 gamepadChanged + ClientMetadata
  # 串流活性监控（Step3 起全程后台）
  liveness_check_sec: 10
  input_stale_sec: 28                # GSSV ~35s 无 input 会断，提前恢复
  video_stale_sec: 45                 # 视频轨无新帧则重连
  liveness_reconnect_after_failures: 3
  xsrp_idle_keepalive_sec: 3          # legacy idle keepalive（已由 access 环取代）
  xsrp_idle_pulse_every_sec: 15
  xsrp_idle_pulse_sec: 0.05
  # 留空则自动从 xHome 响应解析；仅当自动解析/探测失败时手动指定，例如：
  # base_uri: "https://uks.core.gssv-play-prodxhome.xboxlive.com"

vision:
  decode_mode: auto

# ----------------------------------------------
# 任务执行器配置（高并发支持）
# ----------------------------------------------
task:
  # 0=不限制，压测后按实测写入正整数
  max_concurrent: 0
  max_concurrent_gpu: 0
  max_xbox_sessions: 0
  result_ttl: 3600
  cleanup_interval: 300

# ----------------------------------------------
# 日志配置
# ----------------------------------------------
logging:
  level: "INFO"
  file: "./logs/agent.log"
  max_size: 10
  backup_count: 5

# ----------------------------------------------
# 窗口配置
# ----------------------------------------------
window:
  default_width: 1280
  default_height: 720
  min_width: 800
  min_height: 600
  fit_aspect: true
  default_mode: headless       # Phase A 无头；focus 时升 full
  display_fps_max: 30           # 对齐 streaming XsrpConfig.DECODE_VIDEO_FPS
  title_template: "{email}"     # 对齐 Worker.window_tile
  close_terminates_task: true   # 关窗确认后终止串流+自动化并上报平台
  close_confirm_title: "结束串流"
  close_confirm_message: "关闭窗口将结束串流任务和自动化，是否继续？"
