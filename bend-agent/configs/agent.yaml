# ================================================
# Bend Agent 配置文件
# ================================================
# 本文件用于配置 Agent 的所有运行参数
# 修改后需要重启 Agent 生效

# ----------------------------------------------
# AES加密配置（必须与平台侧 bend-platform/.env 中的 AES_SECRET 一致）
# PowerShell 生成随机密钥: $bytes = New-Object byte[] 16; $random = [System.Security.Cryptography.RandomNumberGenerator]::Create(); $random.GetBytes($bytes); [Convert]::ToBase64String($bytes)
# ----------------------------------------------
aes:
  secret: "0sedzo/xcWVHjwKvJAk4lg=="

# ----------------------------------------------
# 后端服务器配置
# ----------------------------------------------
backend:
  base_url: "http://localhost:8060"
  ws_url: "ws://localhost:8060/ws/agent"
  api_prefix: "/api"

# Platform 回调 API 默认由 backend.base_url + api_prefix 推导，与 ApiClient 共用网关地址
# 可选覆盖: platform.api_url: "http://localhost:8060/api"

# ----------------------------------------------
# Agent设置
# ----------------------------------------------
agent:
  heartbeat_interval: 60
  ws_heartbeat_interval: 60
  reconnect_delay: 5
  max_reconnect_attempts: 10

# ----------------------------------------------
# 视频捕获配置
# ----------------------------------------------
video:
  fps: 10
  capture_interval: 0.1
  max_frame_buffer: 5

# ----------------------------------------------
# 模板匹配配置
# ----------------------------------------------
template:
  threshold: 0.8
  template_dir: "./templates"
  cache_enabled: true

# ----------------------------------------------
# FC Server 远程场景识别（可选，对齐 streaming 生产路径）
# ----------------------------------------------
fc_server:
  enabled: false
  host: "127.0.0.1"
  port: 8080
  prefer_remote_scene: false

# ----------------------------------------------
# 场景检测配置
# ----------------------------------------------
scene:
  detection_interval: 0.5
  confidence_threshold: 0.7

# ----------------------------------------------
# 输入控制配置
# ----------------------------------------------
input:
  click_delay: 0.1
  key_press_delay: 0.05
  move_duration: 0.2

# ----------------------------------------------
# 自动化任务配置
# ----------------------------------------------
automation:
  max_retries: 3
  retry_delay: 2
  action_cooldown: 1

# ----------------------------------------------
# 认证配置
# ----------------------------------------------
auth:
  device_code_timeout: 300   # 设备码认证总超时（秒），默认 5 分钟
  xhome_token_ttl_sec: 14340
  xsts_token_ttl_sec: 57540
  prefetch_console_discovery: true

discovery:
  cache_ttl_sec: 60
  ssdp_enrich_enabled: false
  wakeup_timeout_sec: 30
  smartglass_wake_fallback: true

xhome_stream:
  connection_timeout_sec: 30
  enable_teredo_ice_rewrite: true
  default_play_path: v5/sessions/home/play

vision:
  decode_mode: auto

# ----------------------------------------------
# 任务执行器配置（高并发支持）
# ----------------------------------------------
task:
  max_concurrent: 10
  max_concurrent_gpu: 3
  max_xbox_sessions: 100
  result_ttl: 3600
  cleanup_interval: 300

# ----------------------------------------------
# 日志配置
# ----------------------------------------------
logging:
  level: "INFO"
  file: "./logs/agent.log"
  max_size: 10
  backup_count: 5

# ----------------------------------------------
# 窗口配置
# ----------------------------------------------
window:
  default_width: 1280
  default_height: 720
  min_width: 800
  min_height: 600
  fit_aspect: true
  close_terminates_task: true
