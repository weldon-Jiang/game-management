# ================================================
# Bend Platform 后端服务配置文件
# ================================================
# 本文件包含Spring Boot应用的所有配置项
# 敏感配置使用环境变量，可通过 -D 或系统环境变量覆盖
# 修改后需要重启应用生效

# ----------------------------------------------
# 服务器配置
# ----------------------------------------------
server:
  port: ${SERVER_PORT:8061}

# ----------------------------------------------
# Spring框架配置
# ----------------------------------------------
spring:
  application:
    name: bend-platform

  # ----------------------------------------------
  # Redis配置
  # ----------------------------------------------
  data:
    redis:
      enabled: true
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:D$U@GAMECeKfi}  # 本地开发和 Docker 都用这个密码
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5000}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:8}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
          max-wait: ${REDIS_POOL_MAX_WAIT:-1}

  # ----------------------------------------------
  # 数据库配置
  # ----------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bend_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:D$U@GAMECeKfidb}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      pool-name: HikariCP-BendPlatform
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:3000}

  # ----------------------------------------------
  # JSON序列化配置
  # ----------------------------------------------
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

# ----------------------------------------------
# MyBatis-Plus ORM框架配置
# ----------------------------------------------
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.bend.platform.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ----------------------------------------------
# JWT配置
# ----------------------------------------------
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

# ----------------------------------------------
# AES加密配置
# ----------------------------------------------
aes:
  secret: ${AES_SECRET:}

# ----------------------------------------------
# 监控和管理端点配置
# ----------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# ----------------------------------------------
# CORS跨域配置
# - 本地开发（Gateway模式）：false（由 Gateway 统一处理）
# - 本地直连后端调试：true
# ----------------------------------------------
cors:
  enabled: ${CORS_ENABLED:false}
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3090}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# ----------------------------------------------
# Agent 心跳检测配置
# ----------------------------------------------
agent:
  heartbeat_timeout: ${AGENT_HEARTBEAT_TIMEOUT:120}
  heartbeat_check_interval: ${AGENT_HEARTBEAT_CHECK_INTERVAL:30000}

# ----------------------------------------------
# 任务超时检测配置
# ----------------------------------------------
task:
  timeout_check_interval: ${TASK_TIMEOUT_CHECK_INTERVAL:60000}
  default_timeout_seconds: ${TASK_DEFAULT_TIMEOUT:3600}