# ================================================
# Bend Platform 后端 —— 生产环境覆盖配置
# ================================================
# 激活方式：SPRING_PROFILES_ACTIVE=prod
# 说明：本文件仅覆盖与环境相关的差异项（日志、SQL 日志、监控端点），
#       其余配置（数据源、Redis、JWT、AES 等）继承 application.yml，
#       敏感值必须由环境变量注入（见 docker/.env.prod）。

spring:
  config:
    activate:
      on-profile: prod

# 生产降低日志噪音
logging:
  level:
    root: WARN
    com.bend.platform: INFO
    com.bend.platform.config.JwtAuthInterceptor: WARN

# 生产关闭 SQL 控制台日志（性能与敏感信息考虑）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 监控端点：生产仅暴露健康/信息，且不展示健康详情
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
