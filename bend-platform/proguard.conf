# ProGuard 混淆 - Bend Platform 后端
# 保留 Spring 注解类,其余方法名/字段名混淆

-dontshrink
-dontoptimize

-keep public class com.bend.platform.BendPlatformApplication {
    public static void main(java.lang.String[]);
}

-keep @org.springframework.stereotype.Controller class * { *; }
-keep @org.springframework.stereotype.Service class * { *; }
-keep @org.springframework.stereotype.Repository class * { *; }
-keep @org.springframework.context.annotation.Configuration class * { *; }
-keep @org.springframework.stereotype.Component class * { *; }
-keep @org.springframework.web.bind.annotation.RestController class * { *; }
-keep @org.apache.ibatis.annotations.Mapper class * { *; }

-keep class com.bend.platform.annotation.** { *; }
-keep class com.bend.platform.entity.** { *; }
-keep class com.bend.platform.dto.** { *; }
-keep class com.bend.platform.enums.** { *; }
-keep class com.bend.platform.exception.** { *; }
-keep interface com.bend.platform.repository.** { *; }
-keep interface com.bend.platform.service.** { *; }
-keep class com.bend.platform.websocket.** { *; }
-keep class com.bend.platform.config.*Filter* { *; }
-keep class com.bend.platform.config.*Interceptor* { *; }
-keep class com.bend.platform.util.** { *; }
-keep class com.bend.platform.migration.** { *; }

-keepclassmembers class * {
    public *** get*();
    public void set*(***);
    public *** is*();
}
-keepclassmembers class * implements java.io.Serializable {
    static final long serialVersionUID;
    private static final java.io.ObjectStreamField[] serialPersistentFields;
    private void writeObject(java.io.ObjectOutputStream);
    private void readObject(java.io.ObjectInputStream);
    java.lang.Object writeReplace();
    java.lang.Object readResolve();
}
-keepclassmembers class * {
    @org.springframework.scheduling.annotation.Scheduled <methods>;
}

-keepattributes *Annotation*,Signature,EnclosingMethod,Exceptions,InnerClasses
-keepattributes SourceFile,LineNumberTable,LocalVariableTable,LocalVariableTypeTable,MethodParameters

-dontwarn java.lang.management.**
-dontwarn com.bend.platform.service.SystemMonitorService
-dontwarn com.bend.platform.util.JvmInfoUtil
-ignorewarnings
