version: '3.8'

services:
  # 前端 Nginx - 暴露给外部用户
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bend-frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:3090:80"
    depends_on:
      - backend
    networks:
      - bend-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  bend-network:
    external: true
