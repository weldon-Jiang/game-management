# ================================================
# 分控 nginx 配置(由 build-tenant-package.ps1 复制到 staging/tenant/nginx/conf/)
# ================================================
# listen 8090 默认绑定 0.0.0.0(所有网卡),同局域网其他电脑可通过 http://分控IP:8090 访问。
# 前端静态资源在 ../web(相对 nginx.exe 所在目录),由打包脚本放入 {app}\web。
# /api /ws 反代到本机 gateway 127.0.0.1:8060。

server {
    listen 8090;
    server_name _;
    charset utf-8;

    root ../web;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # 前端 SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 反代到本机 gateway
    location /api/ {
        proxy_pass http://127.0.0.1:8060;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        charset utf-8;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket 反代到本机 gateway(Agent 用)
    location /ws/ {
        proxy_pass http://127.0.0.1:8060;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    location /actuator/ {
        proxy_pass http://127.0.0.1:8060;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        access_log off;
        return 200 "healthy";
    }
}
