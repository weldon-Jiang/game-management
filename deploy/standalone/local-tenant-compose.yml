# 本地分控 docker compose(复用总控重建的 bend-xbox-backend:latest 镜像,tenant profile)
# 启: docker compose --env-file docker/.env -f deploy/standalone/local-tenant-compose.yml up -d
# 停: docker compose -f deploy/standalone/local-tenant-compose.yml down
# 日志: docker logs -f bend-tenant-backend
#
# 说明:
#   - DB 连总控 mysql(host.docker.internal:3307 宿主映射),库 bend_platform_tenant
#   - 不连 Redis(tenant profile 排除 RedisAutoConfiguration,走本地 fallback)
#   - 向总控校验 license(host.docker.internal:8060)
#   - 端口 8071 映射宿主,Agent 本地直连 localhost:8071(本地验证跳过 UDP 发现)
#   - MYSQL_ROOT_PASSWORD / AES_SECRET 从 docker/.env 注入(--env-file docker/.env)

services:
  tenant-backend:
    image: bend-xbox-backend:latest
    container_name: bend-tenant-backend
    restart: unless-stopped
    ports:
      - "8071:8071"
    environment:
      SPRING_PROFILES_ACTIVE: tenant
      LICENSE_MODE: tenant
      LICENSE_KEY: LIC-localtest-01
      LICENSE_SECRET: localsecrettest01xyz
      LICENSE_MASTER_URL: http://host.docker.internal:8060
      LICENSE_GATEWAY_PORT: "8071"
      LICENSE_SIGN_SECRET: bend-platform-license-sign-secret-2026-please-change-in-prod
      DB_HOST: host.docker.internal
      DB_PORT: "3307"
      DB_NAME: bend_platform_tenant
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SERVER_PORT: "8071"
      AES_SECRET: ${AES_SECRET}
      JWT_SECRET: tenant-local-jwt-secret-32chars-2026
      CORS_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
