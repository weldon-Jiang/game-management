version: '3.8'

services:
  # 后端 Spring Boot - 暴露给外部（Agent连接）
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bend-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-bend_platform}
      DB_USERNAME: ${MYSQL_USER:-weldon}
      DB_PASSWORD: ${MYSQL_PASSWORD:-D$U@GAMECeKfidb}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-D$U@GAMECeKfi}
      JWT_SECRET: ${JWT_SECRET:-jU1k0/WdUIamaqVsvsGBsLMwiBG2DAE26J+HutQuT0k=}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      AES_SECRET: ${AES_SECRET:-0sedzo/xcWVHjwKvJAk4lg==}
    ports:
      - "0.0.0.0:8061:8061"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8061/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

networks:
  bend-network:
    external: true
