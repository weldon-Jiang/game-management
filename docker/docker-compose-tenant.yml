# ============================================
# Bend Platform 分控(Tenant) Docker Compose
# ============================================
# ⚠ 总控(Master)全栈部署请使用: docker-compose.yml + .env.{dev/sit/prod}
#   总控模式包含 MySQL + Redis 容器，支持 data/core/app/full profile。
# ============================================
# 使用方式：
#   启动：docker compose --env-file .env.tenant -f docker-compose-tenant.yml up -d --build
#   停止：docker compose --env-file .env.tenant -f docker-compose-tenant.yml down
#   日志：docker compose --env-file .env.tenant -f docker-compose-tenant.yml logs -f [service]
# ============================================
# 分控模式特点：
#   - MySQL 复用宿主机本机 3306（不另起容器，总控 Docker MySQL 已用 3307）
#   - 不依赖 Redis（tenant profile 自动排除，走本地 ConcurrentHashMap fallback）
#   - 前端端口 8090（nginx listen 0.0.0.0:8090，同局域网可访问）
#   - 网关端口 8060（Agent 通过局域网 IP 连接）
# ============================================

version: '3.8'

name: bend-platform-tenant

services:
  # ==========================================
  # 后端 Spring Boot（分控模式）
  # ==========================================
  backend:
    build:
      context: ../bend-platform
      dockerfile: Dockerfile
    image: bend-tenant-backend:latest
    container_name: bend-tenant-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # 分控核心：tenant profile + license mode
      SPRING_PROFILES_ACTIVE: tenant
      LICENSE_MODE: tenant
      # 数据库（直连宿主机 MySQL 3306）
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # 安全
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      AES_SECRET: ${AES_SECRET}
      # License（向总控校验）
      LICENSE_SIGN_SECRET: ${LICENSE_SIGN_SECRET}
      LICENSE_MASTER_URL: ${LICENSE_MASTER_URL}
      LICENSE_KEY: ${LICENSE_KEY}
      LICENSE_SECRET: ${LICENSE_SECRET}
      # CORS（分控前端跨域）
      CORS_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: "http://localhost:8090"
      STOMP_ALLOWED_ORIGINS: "http://localhost:8090"
      TZ: ${TZ}
    networks:
      - bend-tenant-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8061/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ==========================================
  # API 网关（分控模式，不连 Redis）
  # ==========================================
  gateway:
    build:
      context: ../bend-gateway
      dockerfile: Dockerfile
    image: bend-tenant-gateway:latest
    container_name: bend-tenant-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-0.0.0.0:8060}:8060"
    environment:
      SPRING_PROFILES_ACTIVE: tenant
      BACKEND_HOST: backend
      BACKEND_PORT: 8061
      TZ: ${TZ}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bend-tenant-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # 前端 Nginx（分控 Web 管理后台，端口 8090）
  # ==========================================
  frontend:
    build:
      context: ../bend-platform-web
      dockerfile: Dockerfile
    image: bend-tenant-frontend:latest
    container_name: bend-tenant-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-0.0.0.0:8090}:80"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - bend-tenant-network
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  bend-tenant-network:
    driver: bridge
    name: bend-tenant-network
