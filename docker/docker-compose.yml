# ============================================
# Bend Platform Docker Compose 配置
# ============================================
# 使用方式：
#   1. 首次部署完整环境：docker compose -f docker-compose.yml up -d
#   2. 仅启动核心服务：docker compose -f docker-compose.yml --profile core up -d
#   3. 仅启动数据层：docker compose -f docker-compose.yml --profile data up -d
#   4. 查看服务状态：docker compose -f docker-compose.yml ps
#   5. 查看日志：docker compose -f docker-compose.yml logs -f [service]
#   6. 停止服务：docker compose -f docker-compose.yml down
#   7. 完全清理（包括数据）：docker compose -f docker-compose.yml down -v --rmi all
# ============================================

version: '3.8'

# 项目名称 - 确保与其他项目区分
name: bend-platform-xbox

services:
  # ==========================================
  # MySQL 数据库
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: bend-xbox-mysql
    restart: ${RESTART_POLICY:-unless-stopped}
    profiles:
      - data
      - full
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${MYSQL_PORT:-127.0.0.1:3306}:3306"
    volumes:
      - bend_xbox_mysql_data:/var/lib/mysql
      - ../bend-platform/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --skip-log-bin
    networks:
      - bend-xbox-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==========================================
  # Redis 缓存
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: bend-xbox-redis
    restart: ${RESTART_POLICY:-unless-stopped}
    profiles:
      - data
      - core
      - full
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-127.0.0.1:6379}:6379"
    volumes:
      - bend_xbox_redis_data:/data
    networks:
      - bend-xbox-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================
  # 后端 Spring Boot 服务
  # ==========================================
  backend:
    build:
      context: ../bend-platform
      dockerfile: Dockerfile
    image: bend-xbox-backend:latest
    container_name: bend-xbox-backend
    restart: ${RESTART_POLICY:-unless-stopped}
    profiles:
      - core
      - full
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      AES_SECRET: ${AES_SECRET}
      CORS_ENABLED: ${CORS_ENABLED:-false}
      TZ: ${TZ}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bend-xbox-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8061/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ==========================================
  # API 网关
  # ==========================================
  gateway:
    build:
      context: ../bend-gateway
      dockerfile: Dockerfile
    image: bend-xbox-gateway:latest
    container_name: bend-xbox-gateway
    restart: ${RESTART_POLICY:-unless-stopped}
    profiles:
      - core
      - full
    ports:
      - "${GATEWAY_PORT:-0.0.0.0:8060}:8060"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BACKEND_HOST: backend
      BACKEND_PORT: 8061
      TZ: ${TZ}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bend-xbox-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # 前端 Nginx 服务
  # ==========================================
  frontend:
    build:
      context: ../bend-platform-web
      dockerfile: Dockerfile
    image: bend-xbox-frontend:latest
    container_name: bend-xbox-frontend
    restart: ${RESTART_POLICY:-unless-stopped}
    profiles:
      - full
    ports:
      - "${FRONTEND_PORT:-0.0.0.0:3090}:80"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - bend-xbox-network
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  bend-xbox-network:
    driver: bridge
    name: bend-xbox-network

volumes:
  bend_xbox_mysql_data:
    driver: local
    name: bend_xbox_mysql_data
  bend_xbox_redis_data:
    driver: local
    name: bend_xbox_redis_data
