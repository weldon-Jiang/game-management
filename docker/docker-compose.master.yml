# ============================================
# Bend Platform — 总控 (Master) Docker Compose
# ============================================
# 包含: MySQL + Redis + 后端 + 网关 + 前端
# 用途: 公网部署总控平台 / 本地开发调试
#
# 启动:  docker compose -f docker-compose.master.yml up -d --build
# 停止:  docker compose -f docker-compose.master.yml down
# 日志:  docker compose -f docker-compose.master.yml logs -f [service]
# 清理:  docker compose -f docker-compose.master.yml down -v --rmi all
#
# ⚠ 分控部署请用: docker-compose.tenant.yml + .env.tenant
#   (分控不含 Redis, MySQL 直连宿主机)
# ============================================

name: bend-platform-master

services:
  # ==========================================
  # MySQL 数据库
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: bend-master-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${MYSQL_PORT:-127.0.0.1:3306}:3306"
    volumes:
      - bend_xbox_mysql_data:/var/lib/mysql
      - ../bend-platform/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --skip-log-bin
    networks:
      - bend-master-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==========================================
  # Redis 缓存
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: bend-master-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_PORT:-127.0.0.1:6379}:6379"
    volumes:
      - bend_xbox_redis_data:/data
    networks:
      - bend-master-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================
  # 后端 Spring Boot 服务
  # ==========================================
  backend:
    build:
      context: ../bend-platform
      dockerfile: Dockerfile
    image: bend-master-backend:latest
    container_name: bend-master-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      AES_SECRET: ${AES_SECRET}
      CORS_ENABLED: ${CORS_ENABLED:-false}
      # 本地调试开关：仅 dev 环境置 true 才写 debug-*.log，sit/prod 缺省 false（零动作）
      BEND_DEBUG_SESSION: ${BEND_DEBUG_SESSION:-false}
      TZ: ${TZ}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bend-master-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8061/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ==========================================
  # API 网关
  # ==========================================
  gateway:
    build:
      context: ../bend-gateway
      dockerfile: Dockerfile
    image: bend-master-gateway:latest
    container_name: bend-master-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-0.0.0.0:8060}:8060"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BACKEND_HOST: backend
      BACKEND_PORT: 8061
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3090}
      TZ: ${TZ}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bend-master-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # 前端 Nginx 服务
  # ==========================================
  frontend:
    build:
      context: ../bend-platform-web
      dockerfile: Dockerfile
    image: bend-master-frontend:latest
    container_name: bend-master-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-0.0.0.0:3090}:80"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - bend-master-network
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  bend-master-network:
    driver: bridge
    name: bend-master-network

volumes:
  bend_xbox_mysql_data:
    driver: local
    name: bend_xbox_mysql_data
  bend_xbox_redis_data:
    driver: local
    name: bend_xbox_redis_data
